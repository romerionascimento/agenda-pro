<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs de Atividades | Agenda-Pro</title>
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/app.css">
    <style>
        .filters-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
        .filters-bar input, .filters-bar select {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
        }
        .log-table {
            width: 100%;
            border-collapse: collapse;
        }
        .log-table th, .log-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .log-table th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        .log-table tr:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }
        .badge-action {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            background-color: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="sidebar-brand-logo">❌</span>
                <span>ControlX.2</span>
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-menu-item">
                    <a href="dashboard.html" id="nav-dashboard">
                        <span>📊</span> Dashboard
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="agenda.html" id="nav-agenda">
                        <span>📅</span> Agenda
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="clientes.html" id="nav-clientes">
                        <span>👥</span> Clientes
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="tecnicos.html" id="nav-tecnicos">
                        <span>🛠️</span> Técnicos
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="equipes.html" id="nav-equipes">
                        <span>🤝</span> Equipes
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="relatorios.html" id="nav-relatorios">
                        <span>📈</span> Relatórios
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="usuarios.html" id="nav-usuarios">
                        <span>🔒</span> Usuários
                    </a>
                </li>
                <li class="sidebar-menu-item active">
                    <a href="logs.html" id="nav-logs">
                        <span>📝</span> Logs
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="configuracoes.html" id="nav-configuracoes">
                        <span>⚙️</span> Configurações
                    </a>
                </li>
            </ul>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">AD</div>
                    <div class="user-details">
                        <span class="user-name">Administrador</span>
                        <span class="user-role">Supervisor</span>
                    </div>
                </div>
                <button class="btn-logout" title="Sair do sistema">🚪</button>
            </div>
        </aside>

        <!-- Main Wrapper -->
        <div class="main-wrapper">
            <header class="main-header">
                <h2 class="header-title">Registro de Atividades (Logs)</h2>
            </header>

            <main class="content-body fade-in">
                <div class="card" style="padding: 20px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px;">
                    <div class="filters-bar">
                        <input type="text" id="filter-user" placeholder="Filtrar por Usuário...">
                        <select id="filter-action">
                            <option value="">Todas as Ações</option>
                            <option value="Agendamento">Agendamento</option>
                            <option value="Cliente">Cliente</option>
                            <option value="Técnico">Técnico</option>
                            <option value="Equipe">Equipe</option>
                            <option value="Usuário">Usuário</option>
                            <option value="Configurações">Configurações</option>
                        </select>
                        <input type="date" id="filter-date">
                    </div>

                    <div class="table-responsive">
                        <table class="log-table">
                            <thead>
                                <tr>
                                    <th>Data / Hora</th>
                                    <th>Usuário</th>
                                    <th>Ação</th>
                                    <th>Detalhes</th>
                                </tr>
                            </thead>
                            <tbody id="logs-list">
                                <!-- Rendered via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/logs.js"></script>
</body>
</html>
