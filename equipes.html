<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipes | Agenda-Pro</title>
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/app.css">
    <style>
        .techs-checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 6px;
            background-color: #242424;
        }
        .tech-checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .tech-checkbox-item input {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="sidebar-brand-logo">❌</span>
                <span>ControlX.2</span>
            </div>
            <ul class="sidebar-menu">
                <li class="sidebar-menu-item">
                    <a href="dashboard.html" id="nav-dashboard">
                        <span>📊</span> Dashboard
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="agenda.html" id="nav-agenda">
                        <span>📅</span> Agenda
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="clientes.html" id="nav-clientes">
                        <span>👥</span> Clientes
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="tecnicos.html" id="nav-tecnicos">
                        <span>🛠️</span> Técnicos
                    </a>
                </li>
                <li class="sidebar-menu-item active">
                    <a href="equipes.html" id="nav-equipes">
                        <span>🤝</span> Equipes
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="relatorios.html" id="nav-relatorios">
                        <span>📈</span> Relatórios
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="usuarios.html" id="nav-usuarios">
                        <span>🔒</span> Usuários
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="logs.html" id="nav-logs">
                        <span>📝</span> Logs
                    </a>
                </li>
                <li class="sidebar-menu-item">
                    <a href="configuracoes.html" id="nav-configuracoes">
                        <span>⚙️</span> Configurações
                    </a>
                </li>
            </ul>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">AD</div>
                    <div class="user-details">
                        <span class="user-name">Administrador</span>
                        <span class="user-role">Supervisor</span>
                    </div>
                </div>
                <button class="btn-logout" title="Sair do sistema">🚪</button>
            </div>
        </aside>

        <!-- Main Wrapper -->
        <div class="main-wrapper">
            <header class="main-header">
                <h2 class="header-title">Gestão de Equipes</h2>
                <div class="header-actions">
                    <button class="btn btn-primary" id="btn-add-team">
                        <span>+</span> Nova Equipe
                    </button>
                </div>
            </header>

            <main class="content-body fade-in">
                <!-- Search Table Bar -->
                <div class="table-container">
                    <div class="table-header-bar">
                        <div class="search-box">
                            <input type="text" id="search-input" placeholder="Pesquisar equipes...">
                            <i>🔍</i>
                        </div>
                    </div>

                    <!-- Responsive Table -->
                    <div class="table-responsive">
                        <table class="custom-table" id="teams-table">
                            <thead>
                                <tr>
                                    <th>Nome da Equipe</th>
                                    <th>Integrantes</th>
                                    <th>Total de Integrantes</th>
                                    <th style="width: 100px; text-align: center;">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="teams-list">
                                <!-- Populated dynamically by equipes.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Team Modal -->
    <div class="modal" id="team-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Nova Equipe</h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <form id="team-form">
                <div class="modal-body">
                    <input type="hidden" id="team-id">
                    
                    <div class="form-group">
                        <label for="team-name">Nome da Equipe *</label>
                        <input type="text" id="team-name" class="form-control" placeholder="Ex: Equipe Alpha (Leste)" required>
                    </div>

                    <div class="form-group">
                        <label>Selecionar Integrantes *</label>
                        <div class="techs-checkbox-grid" id="techs-checkbox-list">
                            <!-- Rendered dynamically -->
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="btn-cancel-team">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/equipes.js"></script>
</body>
</html>
